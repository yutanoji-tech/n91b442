<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>U Share タスク｜Yuta</title>
<style>
:root{
  --paper:#f3f4f8; --surface:#ffffff; --surface-2:#f8f9fc; --line:#e4e6ef;
  --ink:#191c28; --muted:#6b7183; --faint:#9aa0b0;
  --accent:#3a4d8f;
  --danger:#c0392b; --danger-bg:#fbe9e7;
  --warn:#a9720f; --warn-bg:#fdf3d9;
  --ok:#2c7a58; --ok-bg:#e3f3ea;
  --shadow:0 1px 2px rgba(20,25,50,.06),0 6px 20px rgba(20,25,50,.05);
  --radius:14px;
  --p-high:#d6604d; --p-mid:#d6a53c; --p-low:#b7bcc8;
}
@media (prefers-color-scheme:dark){
  :root{
    --paper:#0e1016; --surface:#181b23; --surface-2:#1f2330; --line:#282d3b;
    --ink:#e9ebf2; --muted:#9aa1b3; --faint:#6a7185;
    --accent:#8ea1e0;
    --danger:#e5695f; --danger-bg:#3a1f1d; --warn:#e0b24a; --warn-bg:#332a12;
    --ok:#4bbd88; --ok-bg:#123026;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.28);
    --p-high:#e5776a; --p-mid:#e0b24a; --p-low:#4a5064;
  }
}
:root[data-theme="light"]{--paper:#f3f4f8;--surface:#fff;--ink:#191c28;}
:root[data-theme="dark"]{--paper:#0e1016;--surface:#181b23;--ink:#e9ebf2;}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:var(--paper); color:var(--ink);
  -webkit-font-smoothing:antialiased; line-height:1.5;
  padding-bottom:4rem;
}
.wrap{max-width:840px; margin:0 auto; padding:0 16px}
header.top{
  position:sticky; top:0; z-index:10; background:color-mix(in srgb,var(--paper) 88%,transparent);
  backdrop-filter:saturate(1.4) blur(10px); border-bottom:1px solid var(--line);
}
.top .wrap{display:flex; align-items:center; gap:12px; padding:11px 16px}
.brand{font-weight:700; font-size:15px; letter-spacing:.01em; white-space:nowrap}
.brand small{display:block; font-weight:500; color:var(--faint); font-size:11px; letter-spacing:.04em}
.search{margin-left:auto; flex:1; max-width:260px}
.search input{
  width:100%; padding:8px 12px; border:1px solid var(--line); border-radius:10px;
  background:var(--surface); color:var(--ink); font-size:14px; font-family:inherit;
}
.search input:focus{outline:2px solid color-mix(in srgb,var(--accent) 50%,transparent); outline-offset:0; border-color:var(--accent)}

.eyebrow{font-size:11px; font-weight:700; letter-spacing:.11em; text-transform:uppercase; color:var(--faint); margin:26px 2px 10px}

/* score hero */
.hero{
  margin-top:18px; background:var(--surface); border:1px solid var(--line);
  border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;
  display:grid; grid-template-columns:auto 1fr; gap:0;
}
.score-box{padding:20px 22px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-right:1px solid var(--line); min-width:132px}
.score-num{font-size:56px; font-weight:800; line-height:.95; letter-spacing:-.03em; font-variant-numeric:tabular-nums}
.score-cap{font-size:11px; color:var(--faint); letter-spacing:.1em; text-transform:uppercase; margin-top:6px}
.level{margin-top:10px; font-size:13px; font-weight:700; padding:3px 12px; border-radius:999px}
.hero-body{padding:18px 20px; display:flex; flex-direction:column; gap:12px; justify-content:center}
.action{font-size:14.5px; font-weight:600; line-height:1.55}
.action .lead{color:var(--accent)}
.triad{display:flex; gap:8px; flex-wrap:wrap}
.triad span{font-size:12px; color:var(--muted); background:var(--surface-2); border:1px solid var(--line); padding:4px 10px; border-radius:999px}

/* filter chips */
.chips{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px}
.chip{
  cursor:pointer; user-select:none; font-size:13px; font-weight:600;
  padding:7px 13px; border-radius:999px; border:1px solid var(--line);
  background:var(--surface); color:var(--muted); display:inline-flex; align-items:center; gap:7px;
  transition:transform .06s ease;
}
.chip:active{transform:scale(.96)}
.chip .n{font-variant-numeric:tabular-nums; font-weight:700; color:var(--ink)}
.chip .dot{width:8px; height:8px; border-radius:50%}
.chip[aria-pressed="true"]{background:var(--accent); border-color:var(--accent); color:#fff}
.chip[aria-pressed="true"] .n{color:#fff}
.chip.urg-over[aria-pressed="true"]{background:var(--danger); border-color:var(--danger)}
.chip.urg-soon[aria-pressed="true"]{background:var(--warn); border-color:var(--warn)}

/* list */
ul.tasks{list-style:none; margin:12px 0 0; padding:0; display:flex; flex-direction:column; gap:8px}
li.task{
  background:var(--surface); border:1px solid var(--line); border-left-width:4px;
  border-radius:11px; padding:12px 14px; box-shadow:var(--shadow);
  display:grid; grid-template-columns:1fr auto; gap:6px 12px; align-items:start;
}
li.task.p-高{border-left-color:var(--p-high)} li.task.p-中{border-left-color:var(--p-mid)} li.task.p-低{border-left-color:var(--p-low)}
li.task.is-over{background:var(--danger-bg)}
.t-title{font-size:15px; font-weight:600; line-height:1.45; overflow-wrap:anywhere}
.t-meta{grid-column:1/2; display:flex; flex-wrap:wrap; gap:6px 12px; align-items:center; font-size:12px; color:var(--muted)}
.cat{display:inline-flex; align-items:center; gap:6px; font-weight:600}
.cat .dot{width:8px; height:8px; border-radius:50%}
.prio{font-weight:700; font-size:11px; letter-spacing:.04em}
.prio.高{color:var(--p-high)} .prio.中{color:var(--muted)} .prio.低{color:var(--faint)}
.eff{font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; border:1px solid var(--line); color:var(--muted)}
.eff.b-S{color:var(--ok); border-color:color-mix(in srgb,var(--ok) 45%,var(--line))}
.eff.b-XL{color:var(--warn); border-color:color-mix(in srgb,var(--warn) 45%,var(--line))}
.flag{font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; white-space:nowrap}
.flag.infeasible{color:#fff; background:var(--danger)}
.flag.split{color:var(--warn); border:1px solid color-mix(in srgb,var(--warn) 55%,transparent)}
.due{grid-column:2; justify-self:end; text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; font-size:12.5px}
.due .d-date{font-weight:600}
.due .d-rel{display:block; font-size:11px; color:var(--faint)}
.due.over .d-date,.due.over .d-rel{color:var(--danger); font-weight:700}
.due.soon .d-date,.due.soon .d-rel{color:var(--warn); font-weight:700}
.due.none .d-date{color:var(--faint); font-weight:500}
.empty{color:var(--faint); text-align:center; padding:40px 0; font-size:14px}

details.log{margin-top:14px; background:var(--surface); border:1px solid var(--line); border-radius:11px; box-shadow:var(--shadow)}
details.log>summary{cursor:pointer; padding:14px 16px; font-weight:600; font-size:14px; list-style:none; display:flex; align-items:center; gap:8px}
details.log>summary::-webkit-details-marker{display:none}
details.log>summary::before{content:"▸"; color:var(--faint); transition:transform .15s}
details.log[open]>summary::before{transform:rotate(90deg)}
.log-list{padding:0 16px 12px; display:flex; flex-direction:column; gap:2px}
.log-item{display:flex; gap:10px; padding:7px 0; border-top:1px solid var(--line); font-size:13px; color:var(--muted)}
.log-item .lt{color:var(--ink); text-decoration:line-through; text-decoration-color:var(--faint); overflow-wrap:anywhere}
.log-item .ld{margin-left:auto; font-variant-numeric:tabular-nums; color:var(--faint); white-space:nowrap}

footer{margin-top:30px; padding:18px 2px; border-top:1px solid var(--line); color:var(--faint); font-size:12.5px; line-height:1.7}
footer code{background:var(--surface-2); border:1px solid var(--line); padding:1px 6px; border-radius:6px; font-size:12px; color:var(--muted)}
.upd{color:var(--faint); font-size:12px; font-variant-numeric:tabular-nums}
@media (max-width:560px){
  .hero{grid-template-columns:1fr}
  .score-box{flex-direction:row; gap:16px; border-right:0; border-bottom:1px solid var(--line); justify-content:flex-start}
  .score-num{font-size:44px}
  .brand small{display:none}
}
</style>
</head>

, {"title": "RAチームのアウトプット確認", "category": "RA対応", "priority": "中", "completed_date": "2026-07-15"}, {"title": "RAのアンケート結果共有", "category": "RA対応", "priority": "中", "completed_date": "2026-07-15"}, {"title": "石川さんに振り込みあるか連絡", "category": "RA対応", "priority": "高", "completed_date": "2026-07-15"}, {"title": "騒音について注意喚起", "category": "コミュニティ", "priority": "中", "completed_date": "2026-07-15"}, {"title": "Startup Worldcupの登録", "category": "セールス", "priority": "中", "completed_date": "2026-07-13"}, {"title": "中国マーケインターンの契約書作成", "category": "事業推進", "priority": "高", "completed_date": "2026-07-13"}, {"title": "7月のAll RA Meetingの日程決め", "category": "RA対応", "priority": "中", "completed_date": "2026-07-13"}, {"title": "各RAミーティングの日程調整", "category": "その他", "priority": "中", "completed_date": "2026-07-13"}, {"title": "Nicholas Lamaとの日程確認", "category": "コミュニティ", "priority": "中", "completed_date": "2026-07-13"}, {"title": "OVALの契約書作成", "category": "その他", "priority": "中", "completed_date": "2026-07-10"}, {"title": "CRCCのメールに返信する(龍頭さん引き継ぎ)", "category": "その他", "priority": "中", "completed_date": "2026-07-10"}, {"title": "留学ジャーナルのインタビュー手配", "category": "広告", "priority": "中", "completed_date": "2026-07-10"}, {"title": "入居者がオンボーディングを受けているか確認", "category": "コミュニティ", "priority": "中", "completed_date": "2026-07-10"}, {"title": "RAにGatheringの日程共有", "category": "RA対応", "priority": "中", "completed_date": "2026-07-10"}, {"title": "中国マーケインターンの契約書作成 事業推進", "category": "HR", "priority": "高", "completed_date": "2026-07-10"}, {"title": "龍頭さんと職業紹介責任者を相談して決める", "category": "事業推進", "priority": "中", "completed_date": "2026-07-10"}, {"title": "7/22 Gatheringの個別声かけ", "category": "その他", "priority": "中", "completed_date": "2026-07-10"}, {"title": "7/22 Gatheringの個別声かけ 2026/7/9", "category": "その他", "priority": "中", "completed_date": "2026-07-10"}], "score": 82, "overdue": 14, "soon": 12, "nodue": 3, "infeasible": 0, "total": 34, "done_total": 26, "updated": "2026/07/18 12:26", "cats": ["SNS", "セールス", "イベント", "RA対応", "広告", "コミュニティ", "事業推進", "HR", "その他"], "cat_colors": {"SNS": "#d6337f", "セールス": "#c26a2e", "イベント": "#b8912a", "RA対応": "#3f8f4f", "広告": "#7a5bbf", "コミュニティ": "#2f77b5", "事業推進": "#1f8a7a", "HR": "#8a7a4a", "その他": "#8a8f9a"}, "cat_counts": {"SNS": 2, "セールス": 1, "イベント": 4, "RA対応": 5, "広告": 1, "コミュニティ": 9, "事業推進": 5, "その他": 7}};
const $ = s => document.querySelector(s);
const esc = s => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const state = {q:"", urg:null, cat:null};

// hero
$("#score").textContent = DATA.score;
const lv = DATA.score>=70?["🔴 危険","var(--danger)","var(--danger-bg)"]
        : DATA.score>=40?["🟠 警戒","var(--warn)","var(--warn-bg)"]
        : DATA.score>=20?["🟡 注意","var(--warn)","var(--warn-bg)"]
        : ["🟢 安全","var(--ok)","var(--ok-bg)"];
const level=$("#level"); level.textContent=lv[0]; level.style.color=lv[1]; level.style.background=lv[2];
$("#action").innerHTML = '<span class="lead">👉 </span>' + esc(
  DATA.score>=70 ? "期限切れを1件ずつ処理。①人に渡す（担当を変える）②期限を現実的に引き直す ③迷うものは上長・週次MTGで相談。"
: DATA.score>=40 ? "キャパ超え気味。優先度「高」の順番を決め、抱えきれない分は人に渡すか期限延長の相談を。"
: DATA.score>=20 ? "期限が近いものから着手。期限未設定に日付を入れ、相手待ちにはリマインドを。"
: "良好。メモに書いたら反映される。新しいタスクの入れ忘れだけ確認。");
$("#triad").innerHTML =
  `<span>未完了 <b>${DATA.total}</b></span><span>完了ログ <b>${DATA.done_total}</b></span>`;

// urgency chips
const urg=[["over","期限切れ",DATA.overdue,"urg-over"],["infeasible","間に合わない",DATA.infeasible,"urg-over"],["soon","3日以内",DATA.soon,"urg-soon"],["none","期限未設定",DATA.nodue,""]];
$("#urgchips").innerHTML = urg.map(([k,l,n,c])=>
  `<button class="chip ${c}" data-urg="${k}" aria-pressed="false"><span>${l}</span><span class="n">${n}</span></button>`).join("");

// category chips
$("#catchips").innerHTML = DATA.cats.filter(c=>DATA.cat_counts[c]).map(c=>
  `<button class="chip" data-cat="${esc(c)}" aria-pressed="false"><span class="dot" style="background:${DATA.cat_colors[c]}"></span><span>${esc(c)}</span><span class="n">${DATA.cat_counts[c]}</span></button>`).join("")
  || '<span style="color:var(--faint);font-size:13px">—</span>';

function dueInfo(t){
  if(t.due===null) return {cls:"none",date:"期限なし",rel:""};
  const d=t.days;
  const [y,m,dd]=t.due.split("-");
  const date=`${+m}/${+dd}`;
  let cls="", rel="";
  if(d<0){cls="over"; rel=`${-d}日超過`;}
  else if(d===0){cls="soon"; rel="今日";}
  else if(d<=3){cls="soon"; rel=`あと${d}日`;}
  else{rel=`あと${d}日`;}
  return {cls,date,rel};
}

function render(){
  let items=DATA.active.filter(t=>{
    if(state.q && !t.title.toLowerCase().includes(state.q)) return false;
    if(state.cat && t.category!==state.cat) return false;
    if(state.urg==="over" && !(t.due!==null && t.days<0)) return false;
    if(state.urg==="infeasible" && !t.infeasible) return false;
    if(state.urg==="soon" && !(t.due!==null && t.days>=0 && t.days<=3)) return false;
    if(state.urg==="none" && t.due!==null) return false;
    return true;
  });
  $("#listhead").textContent = `タスク（${items.length}）`;
  const list=$("#list");
  if(!items.length){list.innerHTML='<li class="empty">該当なし 🎉</li>'; return;}
  list.innerHTML=items.map(t=>{
    const di=dueInfo(t);
    const over=(t.due!==null&&t.days<0);
    return `<li class="task p-${t.priority} ${over?'is-over':''}">
      <div class="t-title">${esc(t.title)}</div>
      <div class="due ${di.cls}"><span class="d-date">${di.date}</span><span class="d-rel">${di.rel}</span></div>
      <div class="t-meta">
        <span class="cat"><span class="dot" style="background:${DATA.cat_colors[t.category]}"></span>${esc(t.category)}</span>
        <span class="prio ${t.priority}">優先度 ${t.priority}</span>
        ${t.effort_label?`<span class="eff b-${t.bucket}">${esc(t.effort_label)}</span>`:""}
        ${t.infeasible?`<span class="flag infeasible">⚠ 間に合わない</span>`:""}
        ${t.bucket==="XL"?`<span class="flag split">分解推奨</span>`:""}
      </div></li>`;
  }).join("");
}

// completed log
$("#logsum").textContent = `完了ログ（${DATA.done_total}）— 頑張りの記録`;
$("#loglist").innerHTML = DATA.log.length ? DATA.log.map(e=>{
  const [y,m,d]=e.completed_date.split("-");
  return `<div class="log-item"><span class="lt">${esc(e.title)}</span><span class="ld">${+m}/${+d}</span></div>`;
}).join("") : '<div class="log-item" style="border:0;color:var(--faint)">まだありません。メモで行頭に ✓ を付けるとここに溜まります。</div>';

$("#updated").textContent = DATA.updated;

// interactions
$("#q").addEventListener("input",e=>{state.q=e.target.value.trim().toLowerCase(); render();});
document.querySelectorAll("[data-urg]").forEach(b=>b.addEventListener("click",()=>{
  const k=b.dataset.urg; state.urg = state.urg===k?null:k;
  document.querySelectorAll("[data-urg]").forEach(x=>x.setAttribute("aria-pressed", x.dataset.urg===state.urg));
  render();
}));
document.querySelectorAll("[data-cat]").forEach(b=>b.addEventListener("click",()=>{
  const k=b.dataset.cat; state.cat = state.cat===k?null:k;
  document.querySelectorAll("[data-cat]").forEach(x=>x.setAttribute("aria-pressed", x.dataset.cat===state.cat));
  render();
}));
render();

// 3分ごとにキャッシュを回避して最新を読み直す（URLに時刻を付けてCDN/ブラウザキャッシュを外す）
setTimeout(function(){ location.replace(location.pathname + "?t=" + Date.now()); }, 180000);
</script>
