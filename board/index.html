<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>U Share タスクボード</title>
<style>
:root{
  --paper:#f3f4f8; --surface:#fff; --surface-2:#f8f9fc; --line:#e4e6ef;
  --ink:#191c28; --muted:#6b7183; --faint:#9aa0b0; --accent:#3a4d8f;
  --q1:#c0392b; --q1bg:#fdecea; --q2:#2f77b5; --q2bg:#e8f1fa;
  --q3:#a9720f; --q3bg:#fdf3d9; --q4:#7a8090; --q4bg:#eef0f4;
  --danger:#c0392b; --warn:#a9720f;
  --shadow:0 1px 2px rgba(20,25,50,.06),0 4px 14px rgba(20,25,50,.05);
}
@media (prefers-color-scheme:dark){
  :root{
    --paper:#0e1016; --surface:#181b23; --surface-2:#1f2330; --line:#282d3b;
    --ink:#e9ebf2; --muted:#9aa1b3; --faint:#6a7185; --accent:#8ea1e0;
    --q1:#e5695f; --q1bg:#2c1c1a; --q2:#6ea8dc; --q2bg:#16222e;
    --q3:#e0b24a; --q3bg:#2a2314; --q4:#9aa1b3; --q4bg:#1d2028;
    --danger:#e5695f; --warn:#e0b24a;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 18px rgba(0,0,0,.28);
  }
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.5;}
header{position:sticky; top:0; z-index:20; background:color-mix(in srgb,var(--paper) 90%,transparent);
  backdrop-filter:blur(10px); border-bottom:1px solid var(--line); padding:10px 16px;
  display:flex; align-items:center; gap:12px; flex-wrap:wrap}
h1{font-size:16px; margin:0; font-weight:700}
h1 small{font-weight:500; color:var(--faint); font-size:12px; margin-left:6px}
.tools{margin-left:auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap}
button.btn{font:inherit; font-size:13px; padding:6px 12px; border-radius:9px; border:1px solid var(--line);
  background:var(--surface); color:var(--ink); cursor:pointer}
button.btn:hover{border-color:var(--accent)}
label.toggle{font-size:13px; color:var(--muted); display:flex; align-items:center; gap:5px; cursor:pointer}

.grid{max-width:1200px; margin:16px auto; padding:0 16px; display:grid; grid-template-columns:1fr 1fr; gap:14px}
@media (max-width:760px){ .grid{grid-template-columns:1fr} }
.quad{background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow);
  display:flex; flex-direction:column; min-height:150px}
.quad-head{padding:11px 14px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:8px; border-radius:14px 14px 0 0}
.quad-head .badge{font-weight:800; font-size:13px}
.quad-head .sub{font-size:11.5px; color:var(--muted)}
.quad-head .cnt{margin-left:auto; font-size:12px; color:var(--faint); font-variant-numeric:tabular-nums}
.q1 .quad-head{background:var(--q1bg)} .q1 .badge{color:var(--q1)}
.q2 .quad-head{background:var(--q2bg)} .q2 .badge{color:var(--q2)}
.q3 .quad-head{background:var(--q3bg)} .q3 .badge{color:var(--q3)}
.q4 .quad-head{background:var(--q4bg)} .q4 .badge{color:var(--q4)}
.list{padding:8px; display:flex; flex-direction:column; gap:7px; flex:1; min-height:56px}
.list.dragover{background:color-mix(in srgb,var(--accent) 8%,transparent); border-radius:0 0 14px 14px}
.addbtn{margin:2px 8px 10px; align-self:flex-start; font-size:13px; color:var(--accent); background:none;
  border:1px dashed var(--line); border-radius:8px; padding:5px 10px; cursor:pointer}

.card{background:var(--surface-2); border:1px solid var(--line); border-left-width:4px; border-radius:10px;
  padding:8px 9px; display:flex; flex-direction:column; gap:5px}
.card.pri-高{border-left-color:var(--q1)} .card.pri-中{border-left-color:var(--q3)} .card.pri-低{border-left-color:var(--faint)}
.card.done{opacity:.55}
.card.done .title{text-decoration:line-through; color:var(--muted)}
.card.overdue{background:var(--q1bg); border-color:color-mix(in srgb,var(--q1) 50%,var(--line))}
.card .row1{display:flex; align-items:center; gap:8px}
.handle{cursor:grab; color:var(--faint); font-size:15px; line-height:1; user-select:none; flex:none}
.handle:active{cursor:grabbing}
.card.dragging{opacity:.4}
.chk{width:18px; height:18px; cursor:pointer; flex:none}
.title{flex:1; font-size:14px; font-weight:600; outline:none; min-width:0; overflow-wrap:anywhere}
.title:focus{background:color-mix(in srgb,var(--accent) 10%,transparent); border-radius:4px}
.del{flex:none; border:none; background:none; color:var(--faint); cursor:pointer; font-size:15px; line-height:1; padding:2px 4px}
.del:hover{color:var(--danger)}
.flag{font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; white-space:nowrap}
.flag.late{color:#fff; background:var(--danger)}
.flag.today{color:var(--warn); border:1px solid color-mix(in srgb,var(--warn) 55%,transparent)}
.meta{display:flex; flex-wrap:wrap; gap:6px; align-items:center; padding-left:27px}
.meta select,.meta input[type=date]{font:inherit; font-size:11.5px; color:var(--muted); background:var(--surface);
  border:1px solid var(--line); border-radius:6px; padding:2px 5px}
.meta .due-late{color:var(--danger); border-color:var(--danger); font-weight:700}
.meta .due-soon{color:var(--warn); border-color:var(--warn); font-weight:700}

.routine{max-width:1200px; margin:6px auto 40px; padding:0 16px}
.routine h2{font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); margin:18px 2px 8px}
.rlist{background:var(--surface); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); padding:8px}
.ritem{display:flex; align-items:center; gap:9px; padding:6px 6px; border-bottom:1px solid var(--line)}
.ritem:last-child{border-bottom:none}
.ritem .freq{font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; background:var(--surface-2); border:1px solid var(--line); color:var(--muted)}
.ritem .rtext{flex:1; outline:none; font-size:14px}
.ritem .rtext:focus{background:color-mix(in srgb,var(--accent) 10%,transparent); border-radius:4px}
.ritem.done .rtext{text-decoration:line-through; color:var(--muted)}
.ritem .rnext{font-size:11px; color:var(--faint); white-space:nowrap}
.hint{color:var(--faint); font-size:12px; margin:0 2px 10px}
</style>
</head>
<body>
<header>
  <h1>U Share タスクボード<small id="stamp"></small></h1>
  <div class="tools">
    <label class="toggle"><input type="checkbox" id="hideDone"> 完了を隠す</label>
    <button class="btn" id="exportBtn">書き出し</button>
    <button class="btn" id="importBtn">読み込み</button>
    <input type="file" id="importFile" accept="application/json" hidden>
  </div>
</header>

<p class="hint" style="max-width:1200px;margin:12px auto 0;padding:0 16px">
  カード左の「⠿」をドラッグして象限を移動 ／ タイトル・期日・優先度はその場で編集 ／ 変更は自動保存されます。
</p>

<div class="grid" id="grid"></div>

<div class="routine">
  <h2>常にやること（ルーティン）</h2>
  <div class="rlist" id="rlist"></div>
  <button class="addbtn" id="addRoutine" style="margin-top:8px">+ ルーティンを追加</button>
</div>

<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyARqWam0TKzMV57cy4GxwCzHtRlfSI51vQ",
  authDomain: "yuta-s-tasks.firebaseapp.com",
  projectId: "yuta-s-tasks",
  storageBucket: "yuta-s-tasks.firebasestorage.app",
  messagingSenderId: "24897905739",
  appId: "1:24897905739:web:25c59b70c853a5e85959ce"
};
let _docRef=null, _setDoc=null, _onSnapshot=null, _cloudReady=false;
let _pushTimer=null, _editing=false, _pendingRemote=null, _applyingRemote=false;
try {
  const appMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
  const fs = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
  const _db = fs.getFirestore(appMod.initializeApp(firebaseConfig));
  _docRef = fs.doc(_db, "board", "main");
  _setDoc = fs.setDoc; _onSnapshot = fs.onSnapshot;
  _cloudReady = true;
} catch(e){ console.warn("Firebase読み込み失敗。ローカルのみで動作します。", e); }
function cloudPush(){
  if(!_cloudReady) return;
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(()=>{
    _setDoc(_docRef, {data: JSON.stringify({tasks:state.tasks, routines:state.routines}), ts: Date.now()})
      .then(()=>setStamp("☁ 同期済")).catch(e=>{ console.warn("push",e); setStamp("⚠ 同期エラー"); });
  }, 400);
}

const CATS = ["SNS","セールス","イベント","RA対応","広告","コミュニティ","事業推進","HR","その他"];
const QUAD = {
  q1:{badge:"① 重要 × 緊急", sub:"今すぐやる"},
  q2:{badge:"② 重要 × 緊急でない", sub:"計画してやる"},
  q3:{badge:"③ 緊急 × 重要でない", sub:"手早く / 人に任せる"},
  q4:{badge:"④ どちらでもない", sub:"後回し / やめる"},
};
const KEY = "ushare_board_v2";
const uid = () => Math.random().toString(36).slice(2,9);
const today = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
function daysLeft(due){ if(!due) return null; const d=new Date(due+"T00:00:00"); return Math.round((d-today())/86400000); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function weekStartTime(dt){ const x=new Date(dt); x.setHours(0,0,0,0); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); return x.getTime(); } // 月曜始まり
// 頻度に応じて「今の期間に完了済みか」を判定。翌日/翌週/翌月になると自動でfalse＝空欄に戻る
function isCurrentPeriod(freq, doneAt){
  if(!doneAt) return false;
  const d=new Date(doneAt+"T00:00:00"), now=new Date();
  if(freq==="毎日") return d.toDateString()===now.toDateString();
  if(freq==="毎月") return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  return weekStartTime(d)===weekStartTime(now); // 毎週
}

const SEED = [
 ["SNS","Liuさんの記事作成、Marinaさんに確認依頼","中","2026-07-17"],
 ["SNS","入居者へのインタビューを行う","中","2026-08-31"],
 ["イベント","早稲田地球感謝祭の内容を詰める","高","2026-07-17"],
 ["イベント","スタートアップワールドカップ報告","中","2026-07-18"],
 ["RA対応","RA報酬額の算定","高","2026-07-17"],
 ["RA対応","RA報酬額をあさこさんに伝えて入金依頼する","高","2026-07-20"],
 ["RA対応","7/31内見対応","高","2026-07-21"],
 ["RA対応","8月のAll RA Meetingの日程決め","中","2026-07-17"],
 ["RA対応","WISE口座でRA報酬の振込","中","2026-07-25"],
 ["RA対応","RAのトレーニング（エスカレ、ゴミ捨てなど）","中","2026-07-23"],
 ["RA対応","RA報酬メモ追記","中","2026-07-21"],
 ["RA対応","整理会の日程調整","中","2026-07-21"],
 ["コミュニティ","予約システムの導入","高","2026-07-16"],
 ["コミュニティ","マグカップ回収","低","2026-07-16"],
 ["コミュニティ","Living Guidelineへの追記","中","2026-07-16"],
 ["コミュニティ","Residents Onboarding Guidebookのフィードバック","中","2026-07-17"],
 ["コミュニティ","Residential Educationの言語化","中","2026-07-20"],
 ["コミュニティ","喫煙ルールについてLiving GuidelineとHousing Ruleを更新","中","2026-07-21"],
 ["コミュニティ","WANGさんに洗濯機に関してケア","中",""],
 ["コミュニティ","洗濯機での下着の使い方についてLiving Guidelineに追記","中",""],
 ["事業推進","国際電話どれがいいプランなのか調査する","高","2026-07-21"],
 ["事業推進","OVAL JAPAN協賛対応","中","2026-07-16"],
 ["事業推進","KING協賛ブック・協賛企業紹介スライド掲載情報の提供","中","2026-07-16"],
 ["事業推進","指定有給を設定する","中","2026-07-22"],
 ["事業推進","10万円以上の物品があるか確認","中","2026-07-22"],
 ["その他","AMEXカードのログインをして明細を確認","中","2026-07-21"],
 ["その他","勉強会を設定する","中","2026-07-21"],
 ["その他","費用一覧をアップデートする","中","2026-07-21"],
];
const SEED_ROUTINE = [
 ["毎週","面談で使える小ネタを更新"],
 ["毎週","週次レビュー：4象限を見直し、締切を引き直す"],
 ["毎日","RA・入居者の連絡/問い合わせを確認"],
 ["毎月","PMBM Notice を展開"],
];

function autoQuad(pri, due){
  const d = daysLeft(due);
  const urgent = d!==null && d<=2;   // 締切2日以内/超過
  const important = pri==="高";
  if(important && urgent) return "q1";
  if(important) return "q2";
  if(urgent) return "q3";
  return "q4";
}

let state = load();
function load(){
  try{ const s = JSON.parse(localStorage.getItem(KEY)); if(s && s.tasks){ (s.routines||[]).forEach(r=>{ if(r.doneAt===undefined) r.doneAt = r.done ? todayStr() : ""; }); return s; } }catch(e){}
  return {
    tasks: SEED.map(t=>({id:uid(), cat:t[0], title:t[1], pri:t[2], due:t[3]||"", done:false, quad:autoQuad(t[2],t[3])})),
    routines: SEED_ROUTINE.map(r=>({id:uid(), freq:r[0], text:r[1], doneAt:""})),
    hideDone:false,
  };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); stamp(); if(!_applyingRemote) cloudPush(); }
function stamp(){ setStamp("保存済"); }
function setStamp(prefix){ document.getElementById("stamp").textContent = prefix + " " + new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}); }

function dueClass(due){ const d=daysLeft(due); if(d===null) return ""; if(d<0) return "due-late"; if(d<=2) return "due-soon"; return ""; }

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for(const q of ["q1","q2","q3","q4"]){
    const items = state.tasks.filter(t=>t.quad===q && !(state.hideDone && t.done));
    const col = document.createElement("section");
    col.className = "quad "+q;
    col.innerHTML = `<div class="quad-head"><span class="badge">${QUAD[q].badge}</span><span class="sub">${QUAD[q].sub}</span><span class="cnt">${state.tasks.filter(t=>t.quad===q&&!t.done).length}</span></div>`;
    const list = document.createElement("div");
    list.className = "list"; list.dataset.q = q;
    items.sort((a,b)=> (a.done-b.done));
    items.forEach(t=> list.appendChild(card(t)));
    col.appendChild(list);
    const add = document.createElement("button");
    add.className="addbtn"; add.textContent="+ タスクを追加";
    add.onclick = ()=>{ const nt={id:uid(),cat:"その他",title:"新しいタスク",pri:"中",due:"",done:false,quad:q}; state.tasks.push(nt); save(); render(); setTimeout(()=>{const el=document.querySelector(`[data-id="${nt.id}"] .title`); if(el){el.focus(); document.getSelection().selectAllChildren(el);}},0); };
    col.appendChild(add);
    setupDrop(list);
    grid.appendChild(col);
  }
  renderRoutine();
}

function card(t){
  const el = document.createElement("div");
  const dl = daysLeft(t.due);
  const overdue = dl!==null && dl<0 && !t.done;
  el.className = "card pri-"+t.pri + (t.done?" done":"") + (overdue?" overdue":"");
  el.dataset.id = t.id;
  const dc = dueClass(t.due);
  const flag = overdue ? `<span class="flag late">⚠ ${-dl}日超過</span>`
             : (dl===0 && !t.done ? `<span class="flag today">本日締切</span>` : "");
  el.innerHTML = `
    <div class="row1">
      <span class="handle" title="ドラッグで移動">⠿</span>
      <input class="chk" type="checkbox" ${t.done?"checked":""} title="完了">
      <div class="title" contenteditable="true" spellcheck="false"></div>
      <button class="del" title="削除">×</button>
    </div>
    <div class="meta">
      <select class="cat">${CATS.map(c=>`<option ${c===t.cat?"selected":""}>${c}</option>`).join("")}</select>
      <select class="pri">${["高","中","低"].map(p=>`<option ${p===t.pri?"selected":""}>${p}</option>`).join("")}</select>
      <input class="due ${dc}" type="date" value="${t.due||""}">
      ${flag}
    </div>`;
  el.querySelector(".title").textContent = t.title;
  el.querySelector(".chk").onchange = e=>{ t.done=e.target.checked; save(); render(); };
  el.querySelector(".del").onclick = ()=>{ if(confirm("このタスクを削除しますか？")){ state.tasks=state.tasks.filter(x=>x.id!==t.id); save(); render(); } };
  const title = el.querySelector(".title");
  title.onblur = ()=>{ t.title=title.textContent.trim()||"（無題）"; save(); };
  title.onkeydown = e=>{ if(e.key==="Enter"){ e.preventDefault(); title.blur(); } };
  el.querySelector(".cat").onchange = e=>{ t.cat=e.target.value; save(); };
  el.querySelector(".pri").onchange = e=>{ t.pri=e.target.value; el.className="card pri-"+t.pri+(t.done?" done":""); save(); };
  el.querySelector(".due").onchange = e=>{ t.due=e.target.value; save(); render(); };
  // drag：カードのどこをつかんでもOK（編集欄からのドラッグは無効化して編集を優先）
  el.setAttribute("draggable","true");
  el.addEventListener("dragstart", ev=>{
    if(ev.target.closest('input,select,textarea,button,[contenteditable="true"]')){ ev.preventDefault(); return; }
    ev.dataTransfer.setData("text/plain", t.id);
    ev.dataTransfer.effectAllowed="move";
    ev.dataTransfer.setDragImage(el, 20, 20);
    el.classList.add("dragging");
  });
  el.addEventListener("dragend", ()=> el.classList.remove("dragging"));
  return el;
}

function setupDrop(list){
  list.addEventListener("dragover", ev=>{
    ev.preventDefault();
    list.classList.add("dragover");
    const after = afterElement(list, ev.clientY);
    const dragging = document.querySelector(".card.dragging");
    if(!dragging) return;
    if(after==null) list.appendChild(dragging);
    else list.insertBefore(dragging, after);
  });
  list.addEventListener("dragleave", ()=> list.classList.remove("dragover"));
  list.addEventListener("drop", ev=>{
    ev.preventDefault();
    list.classList.remove("dragover");
    const id = ev.dataTransfer.getData("text/plain");
    const t = state.tasks.find(x=>x.id===id);
    if(!t) return;
    t.quad = list.dataset.q;
    // 並び順を DOM の順序に合わせて再構築
    const order = [...list.querySelectorAll(".card")].map(c=>c.dataset.id);
    const inQ = order.map(oid=>state.tasks.find(x=>x.id===oid)).filter(Boolean);
    const others = state.tasks.filter(x=>x.quad!==list.dataset.q);
    inQ.forEach(x=>x.quad=list.dataset.q);
    state.tasks = others.concat(inQ);
    save(); render();
  });
}
function afterElement(list, y){
  const cards = [...list.querySelectorAll(".card:not(.dragging)")];
  let closest = {offset:-Infinity, el:null};
  for(const c of cards){
    const box = c.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset<0 && offset>closest.offset) closest = {offset, el:c};
  }
  return closest.el;
}

function renderRoutine(){
  const rl = document.getElementById("rlist");
  rl.innerHTML = "";
  state.routines.forEach(r=>{
    const checked = isCurrentPeriod(r.freq, r.doneAt);
    const it = document.createElement("div");
    it.className = "ritem"+(checked?" done":"");
    it.innerHTML = `<input type="checkbox" ${checked?"checked":""}>
      <select class="freq-sel">${["毎日","毎週","毎月"].map(f=>`<option ${f===r.freq?"selected":""}>${f}</option>`).join("")}</select>
      <div class="rtext" contenteditable="true" spellcheck="false"></div>
      <span class="rnext"></span>
      <button class="del" title="削除">×</button>`;
    it.querySelector(".rtext").textContent = r.text;
    it.querySelector(".rnext").textContent = checked ? (r.freq==="毎日"?"明日また":r.freq==="毎週"?"来週また":"来月また") : "";
    it.querySelector("input").onchange = e=>{ r.doneAt = e.target.checked ? todayStr() : ""; save(); renderRoutine(); };
    it.querySelector(".freq-sel").onchange = e=>{ r.freq=e.target.value; save(); renderRoutine(); };
    const rt = it.querySelector(".rtext");
    rt.onblur = ()=>{ r.text=rt.textContent.trim()||"（無題）"; save(); };
    it.querySelector(".del").onclick = ()=>{ state.routines=state.routines.filter(x=>x.id!==r.id); save(); renderRoutine(); };
    rl.appendChild(it);
  });
}
document.getElementById("addRoutine").onclick = ()=>{ state.routines.push({id:uid(),freq:"毎週",text:"新しいルーティン",doneAt:""}); save(); renderRoutine(); };

// tools
const hd = document.getElementById("hideDone");
hd.checked = !!state.hideDone;
hd.onchange = ()=>{ state.hideDone=hd.checked; save(); render(); };
document.getElementById("exportBtn").onclick = ()=>{
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ushare_tasks_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
};
document.getElementById("importBtn").onclick = ()=> document.getElementById("importFile").click();
document.getElementById("importFile").onchange = e=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try{ const s=JSON.parse(r.result); if(s.tasks){ state=s; if(!state.routines)state.routines=[]; save(); render(); alert("読み込みました"); } }catch(err){ alert("読み込めませんでした: "+err); } };
  r.readAsText(f);
};

render();

// ===== Firestore リアルタイム同期 =====
function applyRemote(remote){
  _applyingRemote = true;
  state.tasks = remote.tasks || [];
  state.routines = remote.routines || [];
  localStorage.setItem(KEY, JSON.stringify(state));
  render();
  _applyingRemote = false;
}
// 編集中はリモート反映を保留（入力中にフォーカスが飛ぶのを防ぐ）
document.addEventListener("focusin", e=>{ if(e.target.closest(".card, .ritem")) _editing=true; });
document.addEventListener("focusout", e=>{ if(e.target.closest(".card, .ritem")){ _editing=false; if(_pendingRemote){ applyRemote(_pendingRemote); _pendingRemote=null; } } });
if(_cloudReady){
  _onSnapshot(_docRef, snap=>{
    if(!snap.exists()){ cloudPush(); return; }            // 初回：この端末の内容をクラウドへ
    let remote; try{ remote = JSON.parse(snap.data().data); }catch(e){ return; }
    const localJson = JSON.stringify({tasks:state.tasks, routines:state.routines});
    if(JSON.stringify(remote)===localJson){ setStamp("☁ 同期済"); return; } // 自分の書き込みのエコー
    if(_editing){ _pendingRemote = remote; return; }
    applyRemote(remote);
    setStamp("☁ 受信");
  }, err=>{ console.warn("snapshot", err); setStamp("⚠ 同期エラー"); });
} else {
  setStamp("ローカルのみ");
}
</script>
</body>
</html>
